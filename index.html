<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAGAIRA Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #7dd3fc, #38bdf8, #60a5fa);
            background-attachment: fixed;
            color: #1e293b;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .tab-content { display: none; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tab-content.active { display: block; }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .nav-active { 
            background: #f59e0b !important;
            color: white !important;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .social-icon {
            font-size: 1.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center; justify-content: center;
            width: 50px; height: 50px;
            background: white; border-radius: 50%;
        }

        .social-icon:hover {
            transform: translateY(-5px) rotate(5deg);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .icon-insta:hover { color: #E4405F; }
        .icon-linkedin:hover { color: #0A66C2; }
        .icon-github:hover { color: #333; }
        .icon-telegram:hover { color: #0088cc; }
    </style>
</head>
<body class="min-h-screen pb-24 md:pb-0 md:pt-24 flex flex-col">

    <nav class="hidden md:flex fixed top-0 w-full bg-white/60 backdrop-blur-xl p-4 justify-between items-center z-50 shadow-sm border-b border-white/40">
        <h1 class="text-3xl font-extrabold tracking-tighter text-blue-600">VAGAIRA<span class="text-orange-500">.</span></h1>
        <div class="flex space-x-2">
            <button onclick="showTab('home')" class="px-6 py-2 rounded-full font-semibold transition-all hover:bg-white/50" id="d-home">Home</button>
            <button onclick="showTab('pdf')" class="px-6 py-2 rounded-full font-semibold transition-all hover:bg-white/50" id="d-pdf">Document</button>
            <button onclick="showTab('weather')" class="px-6 py-2 rounded-full font-semibold transition-all hover:bg-white/50" id="d-weather">SkyCast</button>
            <button onclick="showTab('qr')" class="px-6 py-2 rounded-full font-semibold transition-all hover:bg-white/50" id="d-qr">Scanner</button>
            <button onclick="showTab('ip')" class="px-6 py-2 rounded-full font-semibold transition-all hover:bg-white/50" id="d-ip">Network</button>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl flex-grow">
        
        <section id="home" class="tab-content active">
            <div class="glass-card p-10 text-center">
                <div class="mb-2 text-orange-500 font-bold tracking-widest uppercase text-xs" id="welcome-subtitle">Node Active</div>
                <h2 class="text-4xl font-extrabold mb-4 text-slate-800">Welcome to VAGAIRA</h2>
                <p class="text-slate-500 text-lg mb-8 italic" id="dynamic-greeting">Setting up your workspace...</p>
                
                <div class="p-8 bg-white/40 rounded-3xl border border-white mb-8">
                    <h3 class="font-bold text-slate-700 uppercase tracking-widest text-sm mb-6">Developer Connect</h3>
                    <div class="flex justify-center flex-wrap gap-5">
                        <a href="javascript:void(0)" onclick="socialConfirm('https://instagram.com/adiityaes')" class="social-icon icon-insta"><i class="fab fa-instagram"></i></a>
                        <a href="javascript:void(0)" onclick="socialConfirm('https://www.linkedin.com/in/aditya-kumar-pandey-ap/')" class="social-icon icon-linkedin"><i class="fab fa-linkedin-in"></i></a>
                        <a href="javascript:void(0)" onclick="socialConfirm('https://github.com/Adiityapandeyup')" class="social-icon icon-github"><i class="fab fa-github"></i></a>
                        <a href="javascript:void(0)" onclick="socialConfirm('https://t.me/adiityaes')" class="social-icon icon-telegram"><i class="fab fa-telegram-plane"></i></a>
                    </div>
                </div>
            </div>
        </section>

        <section id="pdf" class="tab-content">
            <div class="glass-card p-10 text-center">
                <i class="fas fa-file-pdf text-5xl text-blue-500 mb-4"></i>
                <h2 class="text-4xl font-extrabold mb-6">Smart Document</h2>
                <div class="border-2 border-dashed border-blue-200 rounded-2xl p-8 bg-blue-50/50 mb-6">
                    <input type="file" id="imageInput" accept="image/*" class="hidden"/>
                    <label for="imageInput" class="cursor-pointer block">
                        <i class="fas fa-image text-4xl text-blue-400 mb-2"></i>
                        <span class="text-blue-600 font-bold block">Upload Image</span>
                    </label>
                </div>
                <button id="pdfBtn" onclick="convertToPDF()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold hover:bg-orange-600 transition shadow-lg">
                    Generate PDF
                </button>
                <div id="pdfStatus" class="mt-4 text-green-600 font-bold hidden"></div>
            </div>
        </section>

        <section id="weather" class="tab-content">
            <div class="glass-card p-10 text-center">
                <i class="fas fa-cloud-sun text-5xl text-yellow-500 mb-4"></i>
                <h2 class="text-4xl font-extrabold mb-6">SkyCast</h2>
                <div class="flex gap-2 mb-8 bg-white/50 p-2 rounded-2xl">
                    <input type="text" id="cityInput" placeholder="Enter City (e.g. Delhi)" class="flex-1 bg-transparent p-3 outline-none text-center font-bold">
                    <button onclick="getWeatherByCity()" class="bg-blue-500 text-white px-6 rounded-xl"><i class="fas fa-search"></i></button>
                </div>
                <div id="weatherDisplay" class="min-h-[100px] flex flex-col items-center justify-center">
                    <p class="text-slate-400">Search for a city to see weather info</p>
                </div>
            </div>
        </section>

        <section id="qr" class="tab-content">
            <div class="glass-card p-10 text-center">
                <i class="fas fa-qrcode text-5xl text-orange-500 mb-4"></i>
                <h2 class="text-4xl font-extrabold mb-6">Lens Scanner</h2>
                <div id="reader" class="w-full rounded-3xl overflow-hidden border-4 border-white shadow-xl"></div>
                <div id="qr-result" class="mt-8 p-5 bg-white/80 rounded-2xl font-bold text-blue-600">Align QR Code</div>
            </div>
        </section>

        <section id="ip" class="tab-content">
            <div class="glass-card p-10 text-center">
                <i class="fas fa-network-wired text-5xl text-indigo-500 mb-6"></i>
                <h2 class="text-4xl font-extrabold mb-8">Network Pulse</h2>
                <div id="ip-info" class="flex flex-col items-center gap-2">
                    <div class="text-slate-400">Click refresh to fetch IP</div>
                </div>
                <button onclick="checkIP()" class="mt-10 bg-slate-800 text-white px-8 py-3 rounded-full font-bold hover:bg-slate-700 transition flex items-center gap-2 mx-auto">
                    <i class="fas fa-sync-alt"></i> Refresh IP
                </button>
            </div>
        </section>

    </main>

    <nav class="md:hidden fixed bottom-0 w-full bg-white/80 backdrop-blur-2xl flex justify-around p-5 border-t z-50 rounded-t-[40px] shadow-2xl">
        <button onclick="showTab('home')" class="p-3" id="m-home"><i class="fas fa-home text-xl"></i></button>
        <button onclick="showTab('pdf')" class="p-3" id="m-pdf"><i class="fas fa-file-alt text-xl"></i></button>
        <button onclick="showTab('weather')" class="p-3" id="m-weather"><i class="fas fa-cloud text-xl"></i></button>
        <button onclick="showTab('qr')" class="p-3" id="m-qr"><i class="fas fa-expand text-xl"></i></button>
        <button onclick="showTab('ip')" class="p-3" id="m-ip"><i class="fas fa-wifi text-xl"></i></button>
    </nav>

    <script>
        // --- 15 Dynamic Greetings ---
        const greetings = [
            "Ready to simplify your digital tasks?", "Your personal toolkit is online.", "Efficiency starts right here.", 
            "Crafting seamless solutions for you.", "The ultimate utility experience.", "Fast, secure, and stylish tools.", 
            "Let's get some work done today!", "Your digital workflow, supercharged.", "Smart tools for a smarter user.", 
            "Vagaira: Where design meets function.", "Experience the power of Ultra tools.", "Ready to explore the horizon?", 
            "Your workspace is fully optimized.", "All essential tools in one place.", "Welcome back, Aditya!"
        ];

        window.onload = () => {
            document.getElementById('dynamic-greeting').innerText = greetings[Math.floor(Math.random() * greetings.length)];
        };

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(tabId).classList.add('active');
            const dBtn = document.getElementById('d-' + tabId);
            const mBtn = document.getElementById('m-' + tabId);
            if(dBtn) dBtn.classList.add('nav-active');
            if(mBtn) mBtn.classList.add('nav-active');
            if(tabId !== 'qr' && window.html5QrCode) window.html5QrCode.stop().catch(() => {});
            if(tabId === 'qr') startScanner();
        }

        // --- FIXED WEATHER LOGIC ---
        const WEATHER_API_KEY = '6c6b9b579178c338415451671e9ff00b'; 
        async function getWeatherByCity() {
            const city = document.getElementById('cityInput').value;
            const display = document.getElementById('weatherDisplay');
            if(!city) return alert("Please enter city name!");
            
            display.innerHTML = '<i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i>';
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${WEATHER_API_KEY}`);
                const data = await res.json();
                if(data.cod === 200) {
                    display.innerHTML = `
                        <div class="text-6xl font-black text-blue-600">${Math.round(data.main.temp)}°C</div>
                        <div class="text-xl font-bold uppercase text-slate-700">${data.name}</div>
                        <div class="text-slate-500">${data.weather[0].description}</div>
                    `;
                } else { display.innerHTML = "City not found!"; }
            } catch(e) { display.innerHTML = "Error fetching weather."; }
        }

        // --- FIXED NETWORK (IP) LOGIC ---
        async function checkIP() {
            const display = document.getElementById('ip-info');
            display.innerHTML = '<i class="fas fa-circle-notch fa-spin text-3xl text-indigo-500"></i>';
            try {
                const res = await fetch('https://api.ipify.org?format=json'); // Cleaner IP fetching
                const data = await res.json();
                const geoRes = await fetch(`https://ipapi.co/${data.ip}/json/`);
                const geoData = await geoRes.json();
                display.innerHTML = `
                    <div class="text-4xl font-black text-indigo-600">${data.ip}</div>
                    <div class="font-bold text-slate-600 tracking-widest uppercase">${geoData.city || 'Unknown'}, ${geoData.country_name || 'Earth'}</div>
                `;
            } catch (e) { display.innerHTML = "Node Connection Failed"; }
        }

        // --- PDF Logic ---
        async function convertToPDF() {
            const { jsPDF } = window.jspdf;
            const input = document.getElementById('imageInput');
            if (input.files.length === 0) return alert("Upload an image first!");
            const btn = document.getElementById('pdfBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Converting...';
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const doc = new jsPDF();
                    doc.addImage(img, 'JPEG', 15, 15, 180, 160);
                    doc.save("Vagaira_Doc.pdf");
                    btn.innerHTML = "Generate PDF";
                    document.getElementById('pdfStatus').innerHTML = "Success!";
                    document.getElementById('pdfStatus').classList.remove('hidden');
                };
            };
            reader.readAsDataURL(input.files[0]);
        }

        function socialConfirm(url) { if(confirm("Visit developer's profile?")) window.open(url, '_blank'); }

        function startScanner() {
            if(!window.html5QrCode) window.html5QrCode = new Html5Qrcode("reader");
            window.html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
                document.getElementById('qr-result').innerHTML = `<a href="${text}" target="_blank" class="text-orange-500 underline">${text}</a>`;
            }).catch(() => {});
        }
    </script>
</body>
</html>
